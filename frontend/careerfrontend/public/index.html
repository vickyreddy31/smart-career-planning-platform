<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Smart Career Planning Platform</title>

    <meta name="description"
        content="Smart Career Planning Platform helps students and job seekers discover career paths, analyze skills, track progress, and find opportunities." />

    <meta name="keywords"
        content="Career Planning, Resume Analysis, Job Matching, Skill Gap Analysis, Career Roadmap" />

    <meta name="author" content="Smart Career Planning Team" />

    <link rel="icon"
        href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg,
                    #0f172a,
                    #1e293b,
                    #2563eb);
            height: 100vh;
            overflow: hidden;
        }

        #root {
            height: 100vh;
        }

        .loader-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            animation: pulse 2s infinite;
            box-shadow: 0 0 30px rgba(255,255,255,0.4);
        }

        .title {
            color: white;
            font-size: 34px;
            font-weight: 700;
            margin-top: 25px;
            text-align: center;
        }

        .subtitle {
            color: #dbeafe;
            font-size: 16px;
            margin-top: 12px;
            text-align: center;
            max-width: 600px;
            line-height: 1.6;
        }

        .loading-bar {
            width: 280px;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            overflow: hidden;
            margin-top: 35px;
        }

        .loading-progress {
            width: 40%;
            height: 100%;
            background: white;
            border-radius: 20px;
            animation: loading 2s infinite;
        }

        @keyframes loading {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(350%);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }
        }

        .footer {
            position: absolute;
            bottom: 25px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }
    </style>
</head>

<body>

    <noscript>
        You need to enable JavaScript to run this application.
    </noscript>

    <div id="root">

        <div class="loader-container">

            <div class="logo">
                🎯
            </div>

            <h1 class="title">
                Smart Career Planning Platform
            </h1>

            <p class="subtitle">
                Discover career opportunities, analyze skills,
                track growth, and build your professional roadmap
                with an intelligent career planning experience.
            </p>

            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>

            <div class="footer">
                Empowering Careers • Building Futures
            </div>

        </div>

    </div>

</body>

</html>
